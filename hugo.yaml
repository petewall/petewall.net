baseURL: https://petewall.net/
locale: en-us
title: Pete Wall
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

permalinks:
  posts: /:slug/

taxonomies:
  tag: tags
  series: series

params:
  description: Thoughts on life and software.
  author: Pete Wall
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowToc: false
  homeInfoParams:
    Title: Pete Wall
    Content: Thoughts on life and software.
  socialIcons:
    - name: github
      url: https://github.com/petewall
    - name: linkedin
      url: https://www.linkedin.com/in/petewall/

menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: About
      url: /about/
      weight: 2
    - name: Series
      url: /series/
      weight: 3
    - name: Portfolio
      url: /portfolio/
      weight: 4
    - name: Talks
      url: /talks/
      weight: 5

markup:
  goldmark:
    renderer:
      unsafe: true

minify:
  disableJSON: true
