name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview directory
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ ! -d "pr-${PR}" ]; then
            echo "No preview directory pr-${PR}; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -r "pr-${PR}"
          git commit -m "Remove preview for PR #${PR}"
          git push

      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            Preview for PR #${{ github.event.pull_request.number }} has been removed.
